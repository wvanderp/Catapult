name: Build

on:
  push:
    branches: [main]
  workflow_run:
    workflows: ["Collect"]
    branches: [main]
    types:
      - completed
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "latest"
          cache: "npm"

      - name: npm install
        run: npm install

      - name: npm run build
        run: npm run build
        env:
          VITE_WIKIMEDIA_CLIENT_ID: ${{ secrets.VITE_WIKIMEDIA_CLIENT_ID }}

      - name: push changes to remote
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: git add
        run: git add -f dist && git commit -m "Initial build subtree commit"

      - name: git push
        run: |
          git subtree split --prefix dist -b gh-pages
          git push -f origin gh-pages:gh-pages
          git branch -D gh-pages
